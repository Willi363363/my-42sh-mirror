name: Mirror & Build tests

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # GARDE-FOU : bloque la boucle infinie
  # ─────────────────────────────────────────────
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if triggered by bot
        id: check
        run: |
          if [ "${{ github.actor }}" = "github-actions[bot]" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # 1. Mirror + détection de changements
  # ─────────────────────────────────────────────
  sync:
    needs: [guard]
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone orga repo
        run: |
          git clone git@github.com:EpitechPGE1-2025/G-PSU-200-MPL-2-1-42sh-5.git upstream
          cd upstream
          git remote add mirror git@github.com:Willi363363/my-42sh-mirror.git

      - name: Check for changes vs mirror
        id: check_changes
        run: |
          cd upstream
          MIRROR_SHA=$(git ls-remote git@github.com:Willi363363/my-42sh-mirror.git refs/heads/main | awk '{print $1}')
          ORGA_SHA=$(git rev-parse HEAD)
          echo "Orga SHA  : $ORGA_SHA"
          echo "Mirror SHA: $MIRROR_SHA"
          if [ "$ORGA_SHA" != "$MIRROR_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push to mirror (only if changed)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd upstream
          git push mirror main --force

  # ─────────────────────────────────────────────
  # 2. Build de base
  # ─────────────────────────────────────────────
  basic-build:
    needs: [sync]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: make
        run: make CC=gcc
      - name: make clean
        run: make clean
      - name: make fclean
        run: make fclean
      - name: make re
        run: make CC=gcc re
      - name: check binary
        run: ls -l ./42sh

  # ─────────────────────────────────────────────
  # 3. Coding style
  # ─────────────────────────────────────────────
  cs-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile ./Dockerfile
      - name: Build coding-style tests
        run: docker build . -t cs-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run coding-style tests
        run: docker run cs-test:latest

  # ─────────────────────────────────────────────
  # 4. Coverage
  # ─────────────────────────────────────────────
  coverage-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile2 ./Dockerfile
      - name: Build coverage tests
        run: docker build . -t coverage-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run coverage tests
        run: docker run coverage-test:latest

  # ─────────────────────────────────────────────
  # 5. Valgrind
  # ─────────────────────────────────────────────
  valgrind-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: update apt
        run: sudo apt-get update
      - name: setup valgrind
        run: sudo apt-get install -y valgrind
      - name: make
        run: make CC=gcc
      - name: check file
        run: ls -l ./42sh
      - name: run valgrind
        run: valgrind --leak-check=full --show-leak-kinds=all ./42sh ./.github/test.c
      - name: clean
        run: make fclean

  # ─────────────────────────────────────────────
  # 6. Scan-build
  # ─────────────────────────────────────────────
  scan-build-test:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile3 ./Dockerfile
      - name: Build scan-build tests
        run: docker build . -t cs-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run scan-build tests
        run: docker run cs-test:latest

  # ─────────────────────────────────────────────
  # 7. Notif Discord UNIQUE
  #    Skippé si aucun changement détecté
  # ─────────────────────────────────────────────
  notify:
    needs: [guard, sync, basic-build, cs-build, coverage-build, valgrind-build, scan-build-test]
    if: always() && needs.guard.outputs.should_run == 'true' && needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    env:
      R_BUILD:  ${{ needs.basic-build.result }}
      R_CS:     ${{ needs.cs-build.result }}
      R_COV:    ${{ needs.coverage-build.result }}
      R_VAL:    ${{ needs.valgrind-build.result }}
      R_SCAN:   ${{ needs.scan-build-test.result }}
      SHA:      ${{ github.sha }}
      ACTOR:    ${{ github.actor }}

    steps:
      - name: Build summary
        id: summary
        run: |
          icon() { [ "$1" = "success" ] && echo "OK" || echo "FAIL"; }

          if echo "$R_BUILD $R_CS $R_COV $R_VAL $R_SCAN" | grep -q "failure"; then
            TITLE="ECHEC : des tests ont echoue"
          else
            TITLE="SUCCES : tous les tests sont passes"
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT

          {
            echo "description<<EOF"
            echo "Build de base : $(icon $R_BUILD) $R_BUILD"
            echo "Coding style  : $(icon $R_CS) $R_CS"
            echo "Coverage      : $(icon $R_COV) $R_COV"
            echo "Valgrind      : $(icon $R_VAL) $R_VAL"
            echo "Scan-build    : $(icon $R_SCAN) $R_SCAN"
            echo ""
            echo "Commit : $SHA"
            echo "Auteur : $ACTOR"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ steps.summary.outputs.title }}
          description: ${{ steps.summary.outputs.description }}