name: Mirror & Build tests

on:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # 1. Mirror orga → mirror, détecte les changements
  # ─────────────────────────────────────────────
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone orga repo
        run: |
          git clone git@github.com:EpitechPGE1-2025/G-PSU-200-MPL-2-1-42sh-5.git upstream
          cd upstream
          git remote add mirror git@github.com:Willi363363/my-42sh-mirror.git

      - name: Check for changes vs mirror
        id: check_changes
        run: |
          cd upstream
          MIRROR_SHA=$(git ls-remote git@github.com:Willi363363/my-42sh-mirror.git refs/heads/main | awk '{print $1}')
          ORGA_SHA=$(git rev-parse HEAD)
          echo "Orga SHA  : $ORGA_SHA"
          echo "Mirror SHA: $MIRROR_SHA"
          if [ "$ORGA_SHA" != "$MIRROR_SHA" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Push to mirror (only if changed)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          cd upstream
          git push mirror main --force

      - name: Discord notification — sync
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔄 Mirror sync"
          description: |
            **Repo :** `G-PSU-200-MPL-2-1-42sh-5`
            **Changements détectés :** ${{ steps.check_changes.outputs.changed == 'true' && '✅ Oui — mirror mis à jour' || '⏭️ Non — aucun test lancé' }}
            **Déclenché par :** `${{ github.event_name }}` sur `${{ github.ref_name }}`

  # ─────────────────────────────────────────────
  # 2. Build de base
  # ─────────────────────────────────────────────
  basic-build:
    needs: [sync]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: make
        run: make CC=gcc
      - name: make clean
        run: make clean
      - name: make fclean
        run: make fclean
      - name: make re
        run: make CC=gcc re
      - name: check binary
        run: ls -l ./42sh
      - name: Discord notification — basic-build
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔨 Build de base (make / make re)"
          description: |
            **Commit :** `${{ github.sha }}`
            **Auteur :** `${{ github.actor }}`
            **Message :** ${{ github.event.head_commit.message }}

  # ─────────────────────────────────────────────
  # 3. Coding style
  # ─────────────────────────────────────────────
  cs-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile ./Dockerfile
      - name: Build coding-style tests
        run: docker build . -t cs-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run coding-style tests
        run: docker run cs-test:latest
      - name: Discord notification — coding style
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🎨 Coding style"
          description: |
            **Commit :** `${{ github.sha }}`
            **Auteur :** `${{ github.actor }}`
            Vérification du style de code via Docker.

  # ─────────────────────────────────────────────
  # 4. Coverage
  # ─────────────────────────────────────────────
  coverage-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile2 ./Dockerfile
      - name: Build coverage tests
        run: docker build . -t coverage-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run coverage tests
        run: docker run coverage-test:latest
      - name: Discord notification — coverage
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "📊 Coverage"
          description: |
            **Commit :** `${{ github.sha }}`
            **Auteur :** `${{ github.actor }}`
            Analyse de la couverture de tests via Docker.

  # ─────────────────────────────────────────────
  # 5. Valgrind
  # ─────────────────────────────────────────────
  valgrind-build:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: update apt
        run: sudo apt-get update
      - name: setup valgrind
        run: sudo apt-get install -y valgrind
      - name: make
        run: make CC=gcc
      - name: check file
        run: ls -l ./42sh
      - name: run valgrind
        run: valgrind --leak-check=full --show-leak-kinds=all ./42sh ./.github/test.c
      - name: clean
        run: make fclean
      - name: Discord notification — valgrind
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🧠 Valgrind — détection de fuites mémoire"
          description: |
            **Commit :** `${{ github.sha }}`
            **Auteur :** `${{ github.actor }}`
            Analyse mémoire complète (`--leak-check=full --show-leak-kinds=all`).

  # ─────────────────────────────────────────────
  # 6. Scan-build
  # ─────────────────────────────────────────────
  scan-build-test:
    needs: [basic-build]
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Copy Dockerfile inside root
        run: cp ./.github/Dockerfile3 ./Dockerfile
      - name: Build scan-build tests
        run: docker build . -t cs-test --file Dockerfile --tag my-image-name:$(date +%s)
      - name: Run scan-build tests
        run: docker run cs-test:latest
      - name: Discord notification — scan-build
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🔍 Scan-build — analyse statique"
          description: |
            **Commit :** `${{ github.sha }}`
            **Auteur :** `${{ github.actor }}`
            Analyse statique du code source via scan-build.